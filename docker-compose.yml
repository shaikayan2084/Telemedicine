version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: telemedicine-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: telemedicine
    volumes:
      - mongo_data:/data/db
    networks:
      - telemedicine-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemedicine-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/telemedicine
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - telemedicine-net

  signaling:
    build:
      context: ./signaling-server
      dockerfile: Dockerfile
    container_name: telemedicine-signaling
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "4000:4000"
    networks:
      - telemedicine-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telemedicine-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - telemedicine-net

volumes:
  mongo_data:

networks:
  telemedicine-net:
    driver: bridge
